<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VelocityRL Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="overlay.css">
</head>
<body>
    <!-- Widget 1: Session stats (W / L / Streak / MMR) -->
    <div id="game-widget" class="widget game-widget pos-top-center hidden">
        <div class="session-row">
            <div class="sess-cell">
                <span id="sess-wins" class="sess-val green">0</span>
                <span class="sess-lbl">W</span>
            </div>
            <div class="sess-cell">
                <span id="sess-losses" class="sess-val red">0</span>
                <span class="sess-lbl">L</span>
            </div>
            <div class="sess-cell">
                <span id="sess-streak" class="sess-val">0</span>
                <span class="sess-lbl">Streak</span>
            </div>
            <div class="sess-cell">
                <span id="mmr-val" class="sess-val">—</span>
                <span class="sess-lbl">MMR</span>
            </div>
        </div>
    </div>

    <!-- Widget 2: Clock -->
    <div id="hud-widget" class="widget hud-widget pos-top-right hidden">
        <div id="clock-val" class="hud-clock">—</div>
    </div>

    <!-- Edit mode toolbar -->
    <div id="edit-bar" class="edit-bar hidden">
        <span class="edit-hint">Drag widgets to reposition</span>
        <button id="edit-done-btn" class="edit-done-btn">Done</button>
    </div>

    <script src="overlay.js"></script>
</body>
</html>
