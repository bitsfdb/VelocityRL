<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityRL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section">
            <img src="logo.svg" width="32" height="32" alt="VelocityRL Logo">
            <h1>VelocityRL <span class="beta-badge">BETA</span></h1>
        </div>
        
        <nav class="nav-links">
            <div class="nav-item active" data-tab="swapper-tab">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M8 3H3v5M12 21v-4M8 21h8M3 16v5h5M21 16v5h-5"/></svg>
                Swapper
            </div>
            <div class="nav-item" data-tab="restore-tab" id="nav-restore">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4l3 3"/></svg>
                Restore
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" id="website-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Website
            </div>
            <div class="nav-item" id="settings-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </div>
        </div>
    </aside>

    <main>
        <div id="swapper-tab" class="tab-content active">
            <div class="category-strip">
                <button class="cat-btn active" data-slot="All">All Items</button>
                <button class="cat-btn" data-slot="Body">Bodies</button>
                <button class="cat-btn" data-slot="Decal">Decals</button>
                <button class="cat-btn" data-slot="Wheel">Wheels</button>
                <button class="cat-btn" data-slot="Boost">Boosts</button>
                <button class="cat-btn" data-slot="Antenna">Antennas</button>
                <button class="cat-btn" data-slot="Topper">Toppers</button>
                <button class="cat-btn" data-slot="Goal Explosion">Goal Explosions</button>
            </div>

            <div class="swapper-grid">
                <div class="card">
                    <h3>Owned Item</h3>
                    <div class="search-box">
                        <input type="text" id="owned-search" placeholder="Search your items..." autocomplete="off">
                        <div id="owned-results" class="search-flyout"></div>
                    </div>
                    <div id="owned-selected" class="item-selected-view">
                        <div class="clear-item-btn" id="clear-owned">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p style="color: var(--text-secondary); margin-top: 12px; font-size: 13px;">No item selected</p>
                    </div>
                </div>

                <div class="card">
                    <h3>Target Asset</h3>
                    <div class="search-box">
                        <input type="text" id="wanted-search" placeholder="Search target assets..." autocomplete="off">
                        <div id="wanted-results" class="search-flyout"></div>
                    </div>
                    <div id="wanted-selected" class="item-selected-view">
                        <div class="clear-item-btn" id="clear-wanted">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p style="color: var(--text-secondary); margin-top: 12px; font-size: 13px;">No item selected</p>
                    </div>
                </div>
            </div>

            <div class="swapper-controls">
                <button id="apply-swap" class="action-btn" disabled>Swap Items</button>
            </div>
        </div>



        <div id="restore-tab" class="tab-content">
            <div class="restoration-grid">
                <div style="text-align: center; margin-bottom: 32px;">
                    <div style="background: rgba(59, 130, 246, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h2 style="font-size: 24px; margin-bottom: 8px;">Restore/Revert Items</h2>
                    <p style="color: var(--text-secondary); max-width: 400px; margin: 0 auto;">Select specific files to revert or perform a full revert to clean all modifications.</p>
                </div>

                <div id="backup-container" class="backup-list">
                    <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
                        Scanning for backups...
                    </div>
                </div>

                <button id="restore-btn" class="action-btn" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); margin-top: 24px;">Restore All Items</button>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>System Settings</h2>
                <div id="cancel-settings" class="close-modal-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
            <div class="settings-group">
                <label>Rocket League CookedPCConsole Path</label>
                <div class="input-row">
                    <input type="text" id="game-dir" placeholder="Rocket League CookedPCConsole Path" style="width: 100%;">
                    <div id="browse-dir" class="browse-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </div>
                </div>
            </div>
            <button id="close-settings" class="action-btn" style="width: 100%;">Close</button>
        </div>
    </div>

    <div class="status-bar">
        <div style="display: flex; align-items: center; gap: 16px;">
            <span id="status-text">bitsfdb</span>
            <div id="progress-bar-container" class="progress-container hidden">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>
        <div>VelocityRL v1.2.1 BETA</div>
    </div>

    <div id="toast-container"></div>
    <script src="main.js"></script>
</body>
</html>
