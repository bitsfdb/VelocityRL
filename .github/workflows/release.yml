name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  windows:
    permissions:
      contents: write
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update items database
        run: |
          curl -fsSL "https://raw.githubusercontent.com/CrunchyRL/RLUPKTools/refs/heads/main/items.json" -o python/items.json

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-pc-windows-msvc `
            --add-data "python/rl_upk_editor.py;." `
            --add-data "python/keys.txt;." `
            --add-data "python/items.json;." `
            python/rl_asset_swapper.py

      - name: Build standalone CLI
        run: |
          pyinstaller --onefile --name velocityrl `
            --add-data "python/rl_asset_swapper.py;." `
            --add-data "python/rl_upk_editor.py;." `
            --add-data "python/items.json;." `
            --add-data "python/keys.txt;." `
            python/cli.py
          move dist\velocityrl.exe velocityrl.exe

      - name: Generate engine checksum
        shell: pwsh
        run: |
          $engine = "src-tauri/bin/velocity-engine-x86_64-pc-windows-msvc.exe"
          $hash = (Get-FileHash -Path $engine -Algorithm SHA256).Hash.ToLower()
          "$hash  velocity-engine-x86_64-pc-windows-msvc.exe" | Set-Content "python/engine.sha256"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VelocityRL ${{ github.ref_name }}'
          releaseBody: |
            ## VelocityRL ${{ github.ref_name }}

            **Installation:** Download the `.msi` (Windows Installer) or `.exe` (NSIS setup) below.

            **Auto-update:** If you already have VelocityRL installed, the app will notify you of future updates automatically.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true

      - name: Sign installers and upload sigs
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pip install cryptography | Out-Null

          $sigScript = @'
          import os, sys, base64, struct, hashlib
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          def decode_minisign_key(b64_key: str, password: str = "") -> Ed25519PrivateKey:
              raw = base64.b64decode(b64_key)
              # minisign secret key format:
              # 2 bytes sig_algo + 2 bytes kdf_algo + 2 bytes cksum_algo +
              # 8 bytes kdf_salt + 8 bytes kdf_opslimit + 8 bytes kdf_memlimit +
              # 8 bytes key_id + 104 bytes (encrypted key bytes)
              if raw[2:4] == b'Sc':  # scrypt KDF
                  salt = raw[6:38]
                  ops = struct.unpack('<Q', raw[38:46])[0]
                  mem = struct.unpack('<Q', raw[46:54])[0]
                  from cryptography.hazmat.primitives.kdf.scrypt import Scrypt
                  from cryptography.hazmat.backends import default_backend
                  kdf = Scrypt(salt=salt, length=104, n=ops, r=8, p=1, backend=default_backend())
                  key_bytes = kdf.derive(password.encode())
              else:
                  key_bytes = b'\x00' * 104
              # XOR with the encrypted portion
              enc = raw[54:54+104]
              decrypted = bytes(a ^ b for a, b in zip(enc, key_bytes))
              # bytes 32:96 is the Ed25519 seed (private key)
              seed = decrypted[32:64]
              return Ed25519PrivateKey.from_private_bytes(seed)

          def sign_file(path: str, private_key: Ed25519PrivateKey, key_id: bytes) -> str:
              with open(path, 'rb') as f:
                  data = f.read()
              sig_bytes = private_key.sign(data)
              # minisign signature format
              sig_algo = b'Ed'
              payload = sig_algo + key_id + sig_bytes
              b64_sig = base64.b64encode(payload).decode()
              comment = f"signature from minisign secret key"
              trusted_comment = f"timestamp:{__import__('time').time_ns() // 1_000_000_000}\tfile:{os.path.basename(path)}\thashed"
              # Global sig = sign(sig_bytes + trusted_comment)
              global_input = sig_bytes + trusted_comment.encode()
              global_sig = base64.b64encode(private_key.sign(global_input)).decode()
              return f"untrusted comment: {comment}\n{b64_sig}\ntrusted comment: {trusted_comment}\n{global_sig}\n"

          b64_key = os.environ['TAURI_SIGNING_PRIVATE_KEY']
          password = os.environ.get('TAURI_SIGNING_PRIVATE_KEY_PASSWORD', '')
          private_key = decode_minisign_key(b64_key, password)

          # Extract key_id from the base64 key
          raw = base64.b64decode(b64_key)
          key_id = raw[54:54+8] if len(raw) > 62 else b'\x00'*8

          import glob
          patterns = [
              'src-tauri/target/release/bundle/msi/*.msi',
              'src-tauri/target/release/bundle/nsis/*.exe',
          ]
          os.makedirs('sig-output', exist_ok=True)
          for pattern in patterns:
              for f in glob.glob(pattern):
                  sig = sign_file(f, private_key, key_id)
                  sig_name = os.path.basename(f) + '.sig'
                  sig_path = os.path.join('sig-output', sig_name)
                  with open(sig_path, 'w') as sf:
                      sf.write(sig)
                  print(f"Signed: {sig_name}")
          '@

          python -c $sigScript

          Get-ChildItem -Path "sig-output" -Filter "*.sig" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Uploading: $($_.Name)"
            gh release upload ${{ github.ref_name }} $_.FullName --clobber
          }

      - name: Generate installer checksums
        shell: pwsh
        run: |
          $bundles = @(
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe"
          )
          foreach ($pattern in $bundles) {
            foreach ($f in (Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue)) {
              $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($f.Name)" | Set-Content "$($f.FullName).sha256"
            }
          }

      - name: Upload CLI and checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            velocityrl.exe
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update items database
        run: |
          curl -fsSL "https://raw.githubusercontent.com/CrunchyRL/RLUPKTools/refs/heads/main/items.json" -o python/items.json

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-unknown-linux-gnu \
            --add-data "python/rl_upk_editor.py:." \
            --add-data "python/keys.txt:." \
            --add-data "python/items.json:." \
            python/rl_asset_swapper.py

      - name: Generate engine checksum
        run: |
          sha256sum src-tauri/bin/velocity-engine-x86_64-unknown-linux-gnu \
            | awk '{print $1 "  velocity-engine-x86_64-unknown-linux-gnu"}' \
            > python/engine.sha256

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VelocityRL ${{ github.ref_name }}'
          releaseBody: |
            ## VelocityRL ${{ github.ref_name }}

            **Installation (Linux):** Download the `.AppImage` (portable, no install needed) or `.deb` (Debian/Ubuntu) below.

            **Auto-update:** If you already have VelocityRL installed, the app will notify you of future updates automatically.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true

      - name: Sign installers and upload sigs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, base64, struct, glob, time

          def decode_minisign_key(b64_key, password=""):
              raw = base64.b64decode(b64_key)
              if raw[2:4] == b'Sc':
                  salt = raw[6:38]
                  ops = struct.unpack('<Q', raw[38:46])[0]
                  mem = struct.unpack('<Q', raw[46:54])[0]
                  from cryptography.hazmat.primitives.kdf.scrypt import Scrypt
                  from cryptography.hazmat.backends import default_backend
                  kdf = Scrypt(salt=salt, length=104, n=ops, r=8, p=1, backend=default_backend())
                  key_bytes = kdf.derive(password.encode())
              else:
                  key_bytes = b'\x00' * 104
              enc = raw[54:54+104]
              decrypted = bytes(a ^ b for a, b in zip(enc, key_bytes))
              seed = decrypted[32:64]
              from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
              return Ed25519PrivateKey.from_private_bytes(seed), raw[54:54+8]

          def sign_file(path, private_key, key_id):
              with open(path, 'rb') as f:
                  data = f.read()
              sig_bytes = private_key.sign(data)
              sig_algo = b'Ed'
              payload = sig_algo + key_id + sig_bytes
              b64_sig = base64.b64encode(payload).decode()
              trusted_comment = f"timestamp:{int(time.time())}\tfile:{os.path.basename(path)}\thashed"
              global_input = sig_bytes + trusted_comment.encode()
              global_sig = base64.b64encode(private_key.sign(global_input)).decode()
              return f"untrusted comment: signature from minisign secret key\n{b64_sig}\ntrusted comment: {trusted_comment}\n{global_sig}\n"

          b64_key = os.environ['TAURI_SIGNING_PRIVATE_KEY']
          password = os.environ.get('TAURI_SIGNING_PRIVATE_KEY_PASSWORD', '')
          private_key, key_id = decode_minisign_key(b64_key, password)

          os.makedirs('sig-output', exist_ok=True)
          patterns = [
              'src-tauri/target/release/bundle/appimage/*.AppImage',
              'src-tauri/target/release/bundle/deb/*.deb',
          ]
          signed = []
          for pattern in patterns:
              for f in glob.glob(pattern):
                  sig = sign_file(f, private_key, key_id)
                  sig_name = os.path.basename(f) + '.sig'
                  sig_path = os.path.join('sig-output', sig_name)
                  with open(sig_path, 'w') as sf:
                      sf.write(sig)
                  print(f"Signed: {sig_name}")
                  signed.append(sig_path)

          if not signed:
              print("WARNING: No installers found to sign")
          PYEOF

          for f in sig-output/*.sig; do
            [ -f "$f" ] && echo "Uploading: $(basename "$f")" && gh release upload ${{ github.ref_name }} "$f" --clobber || true
          done

      - name: Generate installer checksums
        run: |
          for f in src-tauri/target/release/bundle/appimage/*.AppImage \
                    src-tauri/target/release/bundle/deb/*.deb; do
            [ -f "$f" ] && sha256sum "$f" | awk '{print $1 "  " FILENAME}' FS='\n' > "$f.sha256"
          done

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/appimage/*.sha256
            src-tauri/target/release/bundle/deb/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish latest.json to API
        env:
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import os, json, glob, subprocess, urllib.request, base64

          tag = os.environ.get('GITHUB_REF_NAME', '')
          version = tag.lstrip('v')
          base_url = f"https://github.com/bitsfdb/VelocityRL/releases/download/{tag}"

          def read_sig(path):
              with open(path) as f:
                  lines = f.read().splitlines()
              # line 1 = untrusted comment, line 2 = base64 sig, line 3 = trusted comment, line 4 = global sig
              return lines[1] if len(lines) >= 2 else ""

          def find_sig(pattern):
              files = glob.glob(pattern)
              return read_sig(files[0]) if files else ""

          appimage_sig = find_sig("sig-output/*.AppImage.sig")
          deb_sig      = find_sig("sig-output/*.deb.sig")

          appimage_files = glob.glob("src-tauri/target/release/bundle/appimage/*.AppImage")
          deb_files      = glob.glob("src-tauri/target/release/bundle/deb/*.deb")

          manifest = {
              "version": version,
              "notes": f"VelocityRL {tag}",
              "pub_date": subprocess.check_output(["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"]).decode().strip(),
              "platforms": {}
          }

          if appimage_files and appimage_sig:
              name = os.path.basename(appimage_files[0])
              manifest["platforms"]["linux-x86_64"] = {
                  "signature": appimage_sig,
                  "url": f"{base_url}/{name}"
              }

          if deb_files and deb_sig:
              name = os.path.basename(deb_files[0])
              manifest["platforms"]["linux-x86_64-deb"] = {
                  "signature": deb_sig,
                  "url": f"{base_url}/{name}"
              }

          print("Manifest:", json.dumps(manifest, indent=2))

          internal_secret = os.environ.get('INTERNAL_SECRET', '')
          if internal_secret:
              body = json.dumps(manifest).encode()
              req = urllib.request.Request(
                  "https://api.velocityrl.tech/internal/update-manifest",
                  data=body,
                  headers={
                      "Content-Type": "application/json",
                      "x-internal-secret": internal_secret,
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      print("Posted latest.json:", resp.read().decode())
              except Exception as e:
                  print(f"WARNING: Failed to post latest.json: {e}")
          else:
              print("INTERNAL_SECRET not set, skipping API post")
          PYEOF
