name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VelocityRL ${{ github.ref_name }}'
          releaseBody: |
            See the full changelog in the app — click **What's New** in the status bar.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      - name: Generate installer checksums
        shell: pwsh
        run: |
          foreach ($pattern in @("src-tauri/target/release/bundle/msi/*.msi", "src-tauri/target/release/bundle/nsis/*.exe")) {
            foreach ($f in (Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue)) {
              $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($f.Name)" | Set-Content "$($f.FullName).sha256"
            }
          }

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
