name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-pc-windows-msvc python/rl_asset_swapper.py

      - name: Generate engine checksum
        shell: pwsh
        run: |
          $engine = "src-tauri/bin/velocity-engine-x86_64-pc-windows-msvc.exe"
          $hash = (Get-FileHash -Path $engine -Algorithm SHA256).Hash.ToLower()
          "$hash  velocity-engine-x86_64-pc-windows-msvc.exe" | Set-Content "python/engine.sha256"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VelocityRL ${{ github.ref_name }}'
          releaseBody: |
            ## VelocityRL ${{ github.ref_name }}

            **Installation:** Download the `.msi` (Windows Installer) or `.exe` (NSIS setup) below.

            **Auto-update:** If you already have VelocityRL installed, the updater will notify you automatically.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true

      - name: Generate installer checksums
        shell: pwsh
        run: |
          $bundles = @(
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe"
          )
          foreach ($pattern in $bundles) {
            foreach ($f in (Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue)) {
              $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($f.Name)" | Set-Content "$($f.FullName).sha256"
            }
          }

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-unknown-linux-gnu python/rl_asset_swapper.py

      - name: Generate engine checksum
        run: |
          sha256sum src-tauri/bin/velocity-engine-x86_64-unknown-linux-gnu \
            | awk '{print $1 "  velocity-engine-x86_64-unknown-linux-gnu"}' \
            > python/engine.sha256

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VelocityRL ${{ github.ref_name }}'
          releaseBody: |
            ## VelocityRL ${{ github.ref_name }}

            **Installation (Linux):** Download the `.AppImage` (portable, no install needed) or `.deb` (Debian/Ubuntu) below.

            **Auto-update:** If you already have VelocityRL installed, the updater will notify you automatically.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true

      - name: Generate installer checksums
        run: |
          for f in src-tauri/target/release/bundle/appimage/*.AppImage \
                    src-tauri/target/release/bundle/deb/*.deb; do
            [ -f "$f" ] && sha256sum "$f" | awk '{print $1 "  " FILENAME}' FS='\n' > "$f.sha256"
          done

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/appimage/*.sha256
            src-tauri/target/release/bundle/deb/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
