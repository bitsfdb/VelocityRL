name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  check:
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Create stub sidecar (satisfies Tauri resource check in CI)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin | Out-Null
          New-Item -ItemType File -Force -Path "src-tauri/bin/velocity-engine-x86_64-pc-windows-msvc.exe" | Out-Null

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --release
