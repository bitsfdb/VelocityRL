name: Nightly Dev Build

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC daily
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  windows:
    permissions:
      contents: write
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update items database
        run: |
          curl -fsSL "https://raw.githubusercontent.com/CrunchyRL/RLUPKTools/refs/heads/main/items.json" -o python/items.json

      - name: Patch rl_upk_editor tkinter import
        shell: python
        run: |
          with open('python/rl_upk_editor.py', encoding='utf-8') as f:
              src = f.read()
          old = (
              'try:\n'
              '    import tkinter as tk\n'
              '    from tkinter import filedialog, messagebox, simpledialog, ttk\n'
              '    HAS_GUI = True\n'
              'except ImportError:\n'
              '    HAS_GUI = False'
          )
          new = (
              'HAS_GUI = False\n'
              'class _TkStub:\n'
              '    def __getattr__(self, n): return self\n'
              '    def __call__(self, *a, **kw): return self\n'
              '    def __bool__(self): return False\n'
              '    def __iter__(self): return iter([])\n'
              '    def pack(self, *a, **kw): return self\n'
              '    def grid(self, *a, **kw): return self\n'
              '    def configure(self, *a, **kw): return self\n'
              'tk = filedialog = messagebox = simpledialog = ttk = _TkStub()'
          )
          if old in src:
              src = src.replace(old, new, 1)
              print("Patched tkinter block")
          else:
              print("WARNING: tkinter block not found, attempting broad patch")
              import re
              src = re.sub(
                  r'try:\s+import tkinter.*?(?:except \w+:\s+HAS_GUI = False)',
                  new,
                  src,
                  count=1,
                  flags=re.DOTALL
              )
          with open('python/rl_upk_editor.py', 'w', encoding='utf-8') as f:
              f.write(src)

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-pc-windows-msvc `
            --add-data "python/rl_upk_editor.py;." `
            --add-data "python/keys.txt;." `
            --add-data "python/items.json;." `
            python/rl_asset_swapper.py

      - name: Build standalone CLI
        run: |
          pyinstaller --onefile --name velocityrl `
            --add-data "python/rl_asset_swapper.py;." `
            --add-data "python/rl_upk_editor.py;." `
            --add-data "python/items.json;." `
            --add-data "python/keys.txt;." `
            python/cli.py
          move dist\velocityrl.exe velocityrl.exe

      - name: Generate engine checksum
        shell: pwsh
        run: |
          $engine = "src-tauri/bin/velocity-engine-x86_64-pc-windows-msvc.exe"
          $hash = (Get-FileHash -Path $engine -Algorithm SHA256).Hash.ToLower()
          "$hash  velocity-engine-x86_64-pc-windows-msvc.exe" | Set-Content "python/engine.sha256"

      - name: Install frontend dependencies
        run: npm install

      - name: Delete existing nightly release
        continue-on-error: true
        run: gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: nightly
          releaseName: 'VelocityRL Nightly'
          releaseBody: |
            Automated nightly build from the `dev` branch. May be unstable.

            **This is not a stable release.** For the latest stable version, see the [Releases page](https://github.com/${{ github.repository }}/releases/latest).

            **Commit:** ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false

      - name: Generate installer checksums
        shell: pwsh
        run: |
          $bundles = @(
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe"
          )
          foreach ($pattern in $bundles) {
            foreach ($f in (Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue)) {
              $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($f.Name)" | Set-Content "$($f.FullName).sha256"
            }
          }

      - name: Upload CLI and checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          files: |
            velocityrl.exe
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: windows

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update items database
        run: |
          curl -fsSL "https://raw.githubusercontent.com/CrunchyRL/RLUPKTools/refs/heads/main/items.json" -o python/items.json

      - name: Patch rl_upk_editor tkinter import
        shell: python
        run: |
          with open('python/rl_upk_editor.py', encoding='utf-8') as f:
              src = f.read()
          old = (
              'try:\n'
              '    import tkinter as tk\n'
              '    from tkinter import filedialog, messagebox, simpledialog, ttk\n'
              '    HAS_GUI = True\n'
              'except ImportError:\n'
              '    HAS_GUI = False'
          )
          new = (
              'HAS_GUI = False\n'
              'class _TkStub:\n'
              '    def __getattr__(self, n): return self\n'
              '    def __call__(self, *a, **kw): return self\n'
              '    def __bool__(self): return False\n'
              '    def __iter__(self): return iter([])\n'
              '    def pack(self, *a, **kw): return self\n'
              '    def grid(self, *a, **kw): return self\n'
              '    def configure(self, *a, **kw): return self\n'
              'tk = filedialog = messagebox = simpledialog = ttk = _TkStub()'
          )
          if old in src:
              src = src.replace(old, new, 1)
              print("Patched tkinter block")
          else:
              print("WARNING: tkinter block not found, attempting broad patch")
              import re
              src = re.sub(
                  r'try:\s+import tkinter.*?(?:except \w+:\s+HAS_GUI = False)',
                  new,
                  src,
                  count=1,
                  flags=re.DOTALL
              )
          with open('python/rl_upk_editor.py', 'w', encoding='utf-8') as f:
              f.write(src)

      - name: Build Python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-unknown-linux-gnu \
            --add-data "python/rl_upk_editor.py:." \
            --add-data "python/keys.txt:." \
            --add-data "python/items.json:." \
            python/rl_asset_swapper.py

      - name: Generate engine checksum
        run: |
          sha256sum src-tauri/bin/velocity-engine-x86_64-unknown-linux-gnu \
            | awk '{print $1 "  velocity-engine-x86_64-unknown-linux-gnu"}' \
            > python/engine.sha256

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAGNOSTIC_URL: ${{ secrets.DIAGNOSTIC_URL }}
          DIAGNOSTIC_SECRET: ${{ secrets.DIAGNOSTIC_SECRET }}
        with:
          tagName: nightly
          releaseName: 'VelocityRL Nightly'
          releaseBody: |
            Automated nightly build from the `dev` branch. May be unstable.

            **This is not a stable release.** For the latest stable version, see the [Releases page](https://github.com/${{ github.repository }}/releases/latest).

            **Commit:** ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false

      - name: Generate installer checksums
        run: |
          for f in src-tauri/target/release/bundle/appimage/*.AppImage \
                    src-tauri/target/release/bundle/deb/*.deb; do
            [ -f "$f" ] && sha256sum "$f" | awk '{print $1 "  " FILENAME}' FS='\n' > "$f.sha256"
          done

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          files: |
            src-tauri/target/release/bundle/appimage/*.sha256
            src-tauri/target/release/bundle/deb/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
